name: Secret Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 0'

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret scan
        run: |
          pip install trufflehog
          python3 -m trufflehog filesystem \
            --json \
            --regex \
            --entropy true \
            . > secret-scan.json || true

      - name: Check findings
        run: |
          if [ -s secret-scan.json ]; then
            echo "⚠️ Potential secrets detected"
            cat secret-scan.json | head -20
            exit 1
          else
            echo "✅ No secrets found"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-report
          path: secret-scan.json
